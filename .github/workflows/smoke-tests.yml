name: Smoke Tests

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        provider: [vault, openbao, doppler, doppler-webhook]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Init Docker Swarm
        run: docker swarm init

      - name: Run smoke test for ${{ matrix.provider }}
        # Doppler vars are only consumed by the doppler script: it uses real
        # Doppler when DOPPLER_SMOKE_TOKEN is set (same-repo runs) and otherwise
        # falls back to the local Go mock server. doppler-webhook is mock-only.
        # These are ignored by the other providers.
        env:
          DOPPLER_SMOKE_TOKEN: ${{ secrets.DOPPLER_SMOKE_TOKEN }}
          DOPPLER_PROJECT: ${{ vars.DOPPLER_SMOKE_PROJECT }}
          DOPPLER_CONFIG: ${{ vars.DOPPLER_SMOKE_CONFIG }}
        run: bash scripts/tests/smoke-test-${{ matrix.provider }}.sh

  smoke-test-kv-custom-path:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        provider: [vault-custom-path, openbao-custom-path]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Init Docker Swarm
        run: docker swarm init

      - name: Run smoke test for ${{ matrix.provider }}
        run: bash scripts/tests/smoke-test-${{ matrix.provider }}.sh


  smoke-test-awssm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Start LocalStack
        uses: LocalStack/setup-localstack@v0.2.2
        with:
          image-tag: 'latest'
          install-awslocal: 'true'
        env:
          SERVICES: secretsmanager,kms
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
      - name: Init Docker Swarm
        run: docker swarm init

      - name: Run smoke test for awssm
        run: bash scripts/tests/smoke-test-awssm.sh

