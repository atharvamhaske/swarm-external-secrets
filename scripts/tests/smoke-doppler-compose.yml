version: '3.8'

services:
  app:
    image: busybox:latest
    command: >
      sh -c "
        while true; do
          echo 'Current secret:' && cat /run/secrets/smoke_secret
          sleep 5
        done
      "
    secrets:
      - smoke_secret
    deploy:
      replicas: 1
      restart_policy:
        condition: any
    networks:
      - smoke-network

secrets:
  smoke_secret:
    driver: test-org/swarm-external-secrets:test
    labels:
      doppler_secret_name: "SMOKE_TEST_PASSWORD"

networks:
  smoke-network:
    driver: overlay
