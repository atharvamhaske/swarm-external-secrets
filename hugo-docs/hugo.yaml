baseURL: https://sugar-org.github.io/swarm-external-secrets/
title: Swarm External Secrets
enableRobotsTXT: true
enableGitInfo: true
defaultContentLanguage: en
defaultContentLanguageInSubdir: false

module:
  hugoVersion:
    extended: true
    min: 0.110.0
  imports:
    - path: github.com/google/docsy

languages:
  en:
    languageName: English
    weight: 1
    contentDir: content/en
    params:
      description: Docker Swarm secrets plugin for external providers

markup:
  goldmark:
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
  highlight:
    style: monokai
    lineNos: false
    guessSyntax: true
    noClasses: true

outputs:
  section:
    - HTML
    - RSS
    - print

params:
  copyright: Swarm External Secrets
  privacy_policy: ""
  ui:
    sidebar_menu_compact: false
    sidebar_menu_foldable: true
    sidebar_search_disable: false
    navbar_logo: true
    navbar_translucent_over_cover_disable: true
    breadcrumb_disable: false
    footer_about_enable: true
    readingtime:
      enable: true
    feedback:
      enable: false
  links:
    user:
      - name: GitHub Discussions
        url: https://github.com/sugar-org/swarm-external-secrets/discussions
        icon: fab fa-github
        desc: Community discussions
      - name: Discord
        url: https://discord.gg/4NYdBu7bZy
        icon: fab fa-discord
        desc: Chat with us
  taxonomy:
    taxonomyCloud:
      - tags
    taxonomyCloudTitle:
      - Tag Cloud
    taxonomyPageHeader:
      - tags

menu:
  main:
    - name: Documentation
      weight: 10
      url: /docs/
    - name: Contributing
      weight: 20
      url: /docs/contributing/
    - name: GitHub
      weight: 30
      url: https://github.com/sugar-org/swarm-external-secrets
      pre: <i class='fab fa-github'></i>
    - name: Discord
      weight: 40
      url: https://discord.gg/4NYdBu7bZy
      pre: <i class='fab fa-discord'></i>
